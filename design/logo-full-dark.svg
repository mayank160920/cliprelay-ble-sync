<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- ClipRelay "Beam Simplified" — dark background variant with glow -->
  <defs>
    <linearGradient id="boardGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop stop-color="#0A3A34"/>
      <stop offset="1" stop-color="#082A26"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00FFD5"/>
      <stop offset="1" stop-color="#00DDC0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Clipboard board -->
  <rect x="14" y="26" width="58" height="78" rx="10" fill="url(#boardGrad)" stroke="#00FFD5" stroke-width="1.5" opacity="0.9"/>

  <!-- Clamp base -->
  <rect x="26" y="18" width="34" height="12" rx="5" fill="#082A26" stroke="#00FFD5" stroke-width="1.2"/>
  <!-- Clamp top -->
  <rect x="32" y="14" width="22" height="8" rx="4" fill="#0A3A34" stroke="#00DDC0" stroke-width="1"/>
  <!-- Rivet -->
  <rect x="39" y="22" width="8" height="3" rx="1.5" fill="#00FFD5" opacity="0.55"/>

  <!-- Beam arcs with glow -->
  <g filter="url(#glow)">
    <path d="M78 44 A 24 24 0 0 1 78 82" stroke="url(#arcGrad)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M90 35 A 36 36 0 0 1 90 91" stroke="url(#arcGrad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
