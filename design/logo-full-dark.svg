<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boardGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop stop-color="#0A3A34"/>
      <stop offset="1" stop-color="#082A26"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00FFD5"/>
      <stop offset="1" stop-color="#00DDC0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Board -->
  <rect x="14" y="26" width="58" height="78" rx="12" fill="url(#boardGrad)" stroke="#00FFD5" stroke-width="1.5" opacity="0.9"/>
  <!-- Clamp base -->
  <rect x="24" y="18" width="38" height="14" rx="5" fill="#082A26" stroke="#00FFD5" stroke-width="1.2"/>
  <!-- Clamp top -->
  <rect x="30" y="14" width="26" height="8" rx="4" fill="#0A3A34" stroke="#00DDC0" stroke-width="1"/>
  <!-- Rivet -->
  <rect x="39" y="22" width="8" height="3" rx="1.5" fill="#00FFD5" opacity="0.55"/>
  <!-- Text lines -->
  <rect x="24" y="42" width="38" height="4.5" rx="2.25" fill="#00FFD5" opacity="0.35"/>
  <rect x="24" y="51" width="27" height="4.5" rx="2.25" fill="#00FFD5" opacity="0.22"/>
  <rect x="24" y="60" width="33" height="4.5" rx="2.25" fill="#00FFD5" opacity="0.22"/>
  <rect x="24" y="69" width="20" height="4.5" rx="2.25" fill="#00FFD5" opacity="0.15"/>
  <!-- Beam arcs with glow -->
  <g filter="url(#glow)">
    <path d="M80 48 A 20 20 0 0 1 80 78" stroke="url(#arcGrad)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M90 39 A 32 32 0 0 1 90 87" stroke="url(#arcGrad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M100 30 A 44 44 0 0 1 100 96" stroke="url(#arcGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
  </g>
</svg>
