<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- ClipRelay share menu icon — circular aqua bg, compact for small display sizes -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00FFD5"/>
      <stop offset="1" stop-color="#00DDC0"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="60" cy="60" r="60"/>
    </clipPath>
  </defs>

  <!-- Circular background -->
  <circle cx="60" cy="60" r="60" fill="url(#bgGrad)"/>

  <!-- Icon content, scaled to fit within circle -->
  <g clip-path="url(#circle)">
    <!-- Clipboard board -->
    <rect x="14" y="30" width="54" height="70" rx="8" fill="rgba(0,0,0,0.35)"/>

    <!-- Clamp base -->
    <rect x="22" y="23" width="34" height="12" rx="4" fill="rgba(0,0,0,0.3)"/>
    <!-- Clamp top -->
    <rect x="28" y="19" width="22" height="7" rx="3.5" fill="rgba(0,0,0,0.3)"/>
    <!-- Clamp rivet -->
    <rect x="34" y="26" width="10" height="3" rx="1.5" fill="rgba(255,255,255,0.45)"/>

    <!-- Text lines -->
    <rect x="22" y="46" width="36" height="5" rx="2.5" fill="rgba(255,255,255,0.7)"/>
    <rect x="22" y="56" width="25" height="5" rx="2.5" fill="rgba(255,255,255,0.5)"/>
    <rect x="22" y="66" width="30" height="5" rx="2.5" fill="rgba(255,255,255,0.5)"/>

    <!-- Beam arcs (black on colored bg, thicker for legibility) -->
    <path d="M74 46 A 20 20 0 0 1 74 80" stroke="black" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M86 37 A 32 32 0 0 1 86 89" stroke="black" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <path d="M98 28 A 44 44 0 0 1 98 98" stroke="black" stroke-width="5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
