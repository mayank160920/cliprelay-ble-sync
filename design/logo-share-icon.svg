<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- ClipRelay share menu icon — compact, optimized for small display sizes -->
  <!-- Intended to be rendered inside a circular aqua-gradient container -->

  <!-- Clipboard board (wider to fill space) -->
  <rect x="4" y="22" width="64" height="84" rx="10" fill="rgba(0,0,0,0.35)"/>

  <!-- Clamp base -->
  <rect x="16" y="13" width="40" height="14" rx="5" fill="rgba(0,0,0,0.3)"/>
  <!-- Clamp top -->
  <rect x="24" y="9" width="24" height="7" rx="3.5" fill="rgba(0,0,0,0.3)"/>
  <!-- Clamp rivet -->
  <rect x="31" y="17" width="10" height="3" rx="1.5" fill="rgba(255,255,255,0.45)"/>

  <!-- Text lines -->
  <rect x="16" y="40" width="40" height="5.5" rx="2.75" fill="rgba(255,255,255,0.7)"/>
  <rect x="16" y="52" width="28" height="5.5" rx="2.75" fill="rgba(255,255,255,0.5)"/>
  <rect x="16" y="64" width="35" height="5.5" rx="2.75" fill="rgba(255,255,255,0.5)"/>

  <!-- Beam arcs (black, thicker for legibility at small sizes) -->
  <path d="M74 46 A 20 20 0 0 1 74 80" stroke="black" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M86 37 A 32 32 0 0 1 86 89" stroke="black" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  <path d="M98 28 A 44 44 0 0 1 98 98" stroke="black" stroke-width="5" stroke-linecap="round" fill="none"/>
</svg>
