<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00FFD5"/>
      <stop offset="1" stop-color="#00DDC0"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="60" cy="60" r="60" fill="url(#bgGrad)"/>
  <!-- Mark (centered, thicker strokes for small share-menu sizes) -->
  <g transform="translate(22,22) scale(0.633)">
    <!-- Board -->
    <rect x="14" y="26" width="58" height="78" rx="12" fill="rgba(0,25,22,0.55)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <!-- Clamp base -->
    <rect x="24" y="18" width="38" height="14" rx="5" fill="rgba(0,25,22,0.55)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <!-- Clamp top -->
    <rect x="30" y="14" width="26" height="8" rx="4" fill="rgba(0,30,26,0.5)" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
    <!-- Rivet -->
    <rect x="39" y="22" width="8" height="3" rx="1.5" fill="rgba(255,255,255,0.45)"/>
    <!-- Text lines -->
    <rect x="24" y="42" width="38" height="5.5" rx="2.75" fill="rgba(255,255,255,0.7)"/>
    <rect x="24" y="52" width="27" height="5.5" rx="2.75" fill="rgba(255,255,255,0.5)"/>
    <rect x="24" y="62" width="33" height="5.5" rx="2.75" fill="rgba(255,255,255,0.5)"/>
    <rect x="24" y="72" width="20" height="5.5" rx="2.75" fill="rgba(255,255,255,0.35)"/>
    <!-- Beam arcs (thicker for small sizes) -->
    <path d="M80 48 A 20 20 0 0 1 80 78" stroke="black" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M90 39 A 32 32 0 0 1 90 87" stroke="black" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <path d="M100 30 A 44 44 0 0 1 100 96" stroke="black" stroke-width="5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
