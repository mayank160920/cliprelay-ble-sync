<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- ClipRelay Android icon — Neon Aqua gradient circle, black arcs -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00FFD5"/>
      <stop offset="1" stop-color="#00DDC0"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="60" cy="60" r="60" fill="url(#bgGrad)"/>

  <!-- Clipboard board (centered within circle) -->
  <g transform="translate(22, 22) scale(0.633)">
    <rect x="14" y="26" width="58" height="78" rx="12" fill="rgba(0,25,22,0.55)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>

    <!-- Clamp base -->
    <rect x="24" y="18" width="38" height="14" rx="5" fill="rgba(0,25,22,0.55)" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>
    <!-- Clamp top -->
    <rect x="30" y="14" width="26" height="8" rx="4" fill="rgba(0,30,26,0.5)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <!-- Clamp rivet -->
    <rect x="39" y="22" width="8" height="3" rx="1.5" fill="rgba(255,255,255,0.45)"/>

    <!-- Text lines -->
    <rect x="24" y="42" width="38" height="4.5" rx="2.25" fill="rgba(255,255,255,0.55)"/>
    <rect x="24" y="51" width="27" height="4.5" rx="2.25" fill="rgba(255,255,255,0.35)"/>
    <rect x="24" y="60" width="33" height="4.5" rx="2.25" fill="rgba(255,255,255,0.35)"/>
    <rect x="24" y="69" width="20" height="4.5" rx="2.25" fill="rgba(255,255,255,0.25)"/>

    <!-- Beam arcs (black on colored bg) -->
    <path d="M80 48 A 20 20 0 0 1 80 78" stroke="black" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M90 39 A 32 32 0 0 1 90 87" stroke="black" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M100 30 A 44 44 0 0 1 100 96" stroke="black" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
