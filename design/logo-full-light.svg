<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- ClipRelay "Beam Refined" logo — for light backgrounds -->
  <defs>
    <linearGradient id="boardGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop stop-color="#E0FFF8"/>
      <stop offset="1" stop-color="#D0F5ED"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00897B"/>
      <stop offset="1" stop-color="#00796B"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00796B" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Clipboard board -->
  <rect x="14" y="26" width="58" height="78" rx="12" fill="url(#boardGrad)" stroke="#00897B" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Clamp base -->
  <rect x="24" y="18" width="38" height="14" rx="5" fill="#D0F5ED" stroke="#00897B" stroke-width="1.2"/>
  <!-- Clamp top -->
  <rect x="30" y="14" width="26" height="8" rx="4" fill="#E0FFF8" stroke="#00796B" stroke-width="1"/>
  <!-- Clamp rivet -->
  <rect x="39" y="22" width="8" height="3" rx="1.5" fill="#00796B" opacity="0.6"/>

  <!-- Text lines -->
  <rect x="24" y="42" width="38" height="4.5" rx="2.25" fill="#00897B" opacity="0.45"/>
  <rect x="24" y="51" width="27" height="4.5" rx="2.25" fill="#00897B" opacity="0.3"/>
  <rect x="24" y="60" width="33" height="4.5" rx="2.25" fill="#00897B" opacity="0.3"/>
  <rect x="24" y="69" width="20" height="4.5" rx="2.25" fill="#00897B" opacity="0.2"/>

  <!-- Beam arcs with subtle shadow -->
  <g filter="url(#shadow)">
    <path d="M80 48 A 20 20 0 0 1 80 78" stroke="url(#arcGrad)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M90 39 A 32 32 0 0 1 90 87" stroke="url(#arcGrad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M100 30 A 44 44 0 0 1 100 96" stroke="url(#arcGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
  </g>
</svg>
