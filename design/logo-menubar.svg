<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- ClipRelay menu bar icon — stroke-only, monochrome Neon Aqua -->
  <!-- For macOS template images, replace #00FFD5 with white or use as-is -->

  <!-- Clipboard board -->
  <rect x="14" y="26" width="58" height="78" rx="12" fill="none" stroke="#00FFD5" stroke-width="6"/>

  <!-- Clamp base -->
  <rect x="24" y="18" width="38" height="14" rx="5" fill="none" stroke="#00FFD5" stroke-width="5"/>
  <!-- Clamp top -->
  <rect x="30" y="14" width="26" height="8" rx="4" fill="none" stroke="#00FFD5" stroke-width="4"/>
  <!-- Clamp rivet -->
  <rect x="39" y="22" width="8" height="3" rx="1.5" fill="#00FFD5" opacity="0.75"/>

  <!-- Text lines -->
  <rect x="24" y="44" width="30" height="4" rx="2" fill="#00FFD5" opacity="0.65"/>
  <rect x="24" y="52" width="22" height="4" rx="2" fill="#00FFD5" opacity="0.45"/>
  <rect x="24" y="60" width="26" height="4" rx="2" fill="#00FFD5" opacity="0.35"/>

  <!-- Beam arcs (2 arcs for compact menu bar size) -->
  <path d="M80 48 A 20 20 0 0 1 80 78" stroke="#00FFD5" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M90 39 A 32 32 0 0 1 90 87" stroke="#00FFD5" stroke-width="4.5" stroke-linecap="round" fill="none"/>
</svg>
