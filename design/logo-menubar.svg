<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- ClipRelay "Beam Simplified" — menu bar icon, stroke-only monochrome -->
  <!-- For macOS template images, replace #00FFD5 with white or use as-is -->

  <!-- Clipboard board -->
  <rect x="14" y="26" width="58" height="78" rx="10" fill="none" stroke="#00FFD5" stroke-width="6"/>

  <!-- Clamp base -->
  <rect x="26" y="18" width="34" height="12" rx="5" fill="none" stroke="#00FFD5" stroke-width="5"/>
  <!-- Clamp top -->
  <rect x="32" y="14" width="22" height="8" rx="4" fill="none" stroke="#00FFD5" stroke-width="4"/>
  <!-- Rivet -->
  <rect x="39" y="22" width="8" height="3" rx="1.5" fill="#00FFD5" opacity="0.75"/>

  <!-- Beam arcs -->
  <path d="M78 44 A 24 24 0 0 1 78 82" stroke="#00FFD5" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M90 35 A 36 36 0 0 1 90 91" stroke="#00FFD5" stroke-width="4.5" stroke-linecap="round" fill="none"/>
