<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 60 400 400" width="400" height="400">
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4AE68A"/>
      <stop offset="100%" stop-color="#28A745"/>
    </linearGradient>
    <linearGradient id="grayGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A4A6A"/>
      <stop offset="100%" stop-color="#33334D"/>
    </linearGradient>
    <linearGradient id="streakGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3DDC84"/>
      <stop offset="40%" stop-color="#7DFBB5"/>
      <stop offset="100%" stop-color="#3DDC84"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Left clipboard (Mac - slate) - overlapping slightly behind -->
  <g transform="translate(175, 260) rotate(-8)" filter="url(#shadow)">
    <rect x="-65" y="-88" width="130" height="176" rx="14" fill="url(#grayGrad)"/>
    <!-- Clip -->
    <rect x="-20" y="-98" width="40" height="22" rx="7" fill="#5E5E80"/>
    <rect x="-12" y="-102" width="24" height="10" rx="5" fill="#6E6E90"/>
    <!-- Text lines -->
    <rect x="-45" y="-52" width="90" height="7" rx="3.5" fill="rgba(255,255,255,0.25)"/>
    <rect x="-45" y="-34" width="65" height="7" rx="3.5" fill="rgba(255,255,255,0.18)"/>
    <rect x="-45" y="-16" width="78" height="7" rx="3.5" fill="rgba(255,255,255,0.18)"/>
    <rect x="-45" y="2" width="50" height="7" rx="3.5" fill="rgba(255,255,255,0.12)"/>
    <rect x="-45" y="20" width="70" height="7" rx="3.5" fill="rgba(255,255,255,0.12)"/>
  </g>
  
  <!-- Right clipboard (Android - green) - overlapping in front -->
  <g transform="translate(337, 260) rotate(8)" filter="url(#shadow)">
    <rect x="-65" y="-88" width="130" height="176" rx="14" fill="url(#greenGrad)"/>
    <!-- Clip -->
    <rect x="-20" y="-98" width="40" height="22" rx="7" fill="#22994D"/>
    <rect x="-12" y="-102" width="24" height="10" rx="5" fill="#2BB85C"/>
    <!-- Text lines -->
    <rect x="-45" y="-52" width="90" height="7" rx="3.5" fill="rgba(255,255,255,0.35)"/>
    <rect x="-45" y="-34" width="65" height="7" rx="3.5" fill="rgba(255,255,255,0.25)"/>
    <rect x="-45" y="-16" width="78" height="7" rx="3.5" fill="rgba(255,255,255,0.25)"/>
    <rect x="-45" y="2" width="50" height="7" rx="3.5" fill="rgba(255,255,255,0.18)"/>
    <rect x="-45" y="20" width="70" height="7" rx="3.5" fill="rgba(255,255,255,0.18)"/>
  </g>
  
  <!-- Sync arrows - bold, glowing -->
  <g filter="url(#glow)">
    <!-- Top arrow: left to right -->
    <path d="M210,210 C235,195 270,195 295,210" 
          stroke="url(#streakGrad)" stroke-width="8" stroke-linecap="round" fill="none"/>
    <polygon points="295,204 295,216 308,210" fill="#3DDC84"/>
    
    <!-- Bottom arrow: right to left -->
    <path d="M295,310 C270,325 235,325 210,310" 
          stroke="url(#streakGrad)" stroke-width="8" stroke-linecap="round" fill="none"/>
    <polygon points="210,304 210,316 197,310" fill="#3DDC84"/>
  </g>
</svg>
