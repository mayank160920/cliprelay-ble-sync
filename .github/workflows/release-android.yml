name: Release Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.2)'
        type: string
        required: false
      promote:
        description: 'Promote from internal to production'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    if: inputs.version != '' && !inputs.promote
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set version
        id: version
        run: echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Verify tag does not exist
        run: |
          if git rev-parse "android/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Error: Tag android/v${{ steps.version.outputs.version }} already exists" >&2
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Load secrets from 1Password
        uses: 1Password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          KEYSTORE_BASE64: op://cliprelay/Android Keystore/keystore-base64
          KEYSTORE_PASSWORD: op://cliprelay/Android Keystore/password
          KEY_ALIAS: op://cliprelay/Android Keystore/key-alias
          KEY_PASSWORD: op://cliprelay/Android Keystore/key-password
          PLAY_SERVICE_ACCOUNT_JSON: op://cliprelay/Android Play Store/service-account-json

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/cliprelay-release.keystore

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<PROPS
          storeFile=cliprelay-release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          PROPS

      - name: Create play.properties
        run: |
          echo "$PLAY_SERVICE_ACCOUNT_JSON" > android/play-service-account.json
          echo "serviceAccountCredentials=play-service-account.json" > android/play.properties

      - name: Build release
        run: ./scripts/build-all.sh --android-only

      - name: Publish to internal track
        run: ./scripts/publish-android.sh --track internal

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag -l 'android/v*' --sort=-v:refname | head -1 | sed 's|^android/||')
          if [[ -n "$PREV_TAG" ]]; then
            BODY=$(./scripts/changelog.sh --android "${PREV_TAG}..HEAD")
          else
            BODY="- Initial release"
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "android/v${{ steps.version.outputs.version }}" \
            -m "Android release ${{ steps.version.outputs.version }}"
          git push origin "android/v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "android/v${{ steps.version.outputs.version }}"
          name: "Android v${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.body }}
          files: dist/cliprelay-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  promote:
    if: github.event_name == 'workflow_dispatch' && inputs.promote
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Load secrets from 1Password
        uses: 1Password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          PLAY_SERVICE_ACCOUNT_JSON: op://cliprelay/Android Play Store/service-account-json

      - name: Create play.properties
        run: |
          echo "$PLAY_SERVICE_ACCOUNT_JSON" > android/play-service-account.json
          echo "serviceAccountCredentials=play-service-account.json" > android/play.properties

      - name: Promote to production
        run: ./scripts/publish-android.sh --promote --from internal --to production
